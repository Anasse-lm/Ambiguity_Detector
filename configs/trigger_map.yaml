"<TBD_SCOPE_ENTITY>":
  triggers:
    - {word: records,      source: empirical}
    - {word: data,         source: empirical}
    - {word: information,  source: empirical}
    - {word: orders,       source: empirical}
    - {word: services,     source: empirical}
    - {word: products,     source: empirical}
    - {word: tools,        source: empirical}
    - {word: inventory,    source: empirical}
    - {word: configuration, source: empirical}
    - {word: statements,   source: empirical}
    # --- v1.1 literature additions ---
    - {word: resources,    source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: items,        source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: files,        source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified additions ---
    - {word: people,       source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: knowledge,    source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: thing,        source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: detail,       source: literature, source_citation: AP2022, evidence: DERIVED}
  rationale: >
    Generic entity nouns appearing as direct objects of action verbs.
    Empirical triggers from Cornelius extended with literature-attested
    under-specification markers.

"<TBD_SCOPE_CONDITION>":
  triggers:
    - {word: always,    source: empirical}
    - {word: sometimes, source: empirical}
    # --- v1.2 verified additions (Berry & Kamsties 2000 "The Dangerous All") ---
    - {word: all,       source: literature, source_citation: BK2000, evidence: PRIMARY}
    - {word: any,       source: literature, source_citation: BK2000, evidence: PRIMARY, corroborator: BB2010}
    - {word: every,     source: literature, source_citation: BK2000, evidence: PRIMARY}
    - {word: each,      source: literature, source_citation: BK2000, evidence: PRIMARY}
    - {word: never,     source: literature, source_citation: BK2000, evidence: PRIMARY}
    - {word: none,      source: literature, source_citation: BK2000, evidence: PRIMARY}
    - {word: some,      source: literature, source_citation: BK2000, evidence: DERIVED}
    # --- v1.2 verified phrase additions ---
    - {word: "not limited to",   source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: "as a minimum",     source: literature, source_citation: BB2010, evidence: DERIVED, verification: "primary source TBD; commonly attributed to NASA ARM but not in CL2014 Sec. 3.3.5"}
    - {word: "but not limited to", source: literature, source_citation: BB2010, evidence: DERIVED, verification: "primary source TBD; commonly attributed to NASA ARM but not in CL2014 Sec. 3.3.5"}
  rationale: >
    Universal or unbounded quantifiers that mask context-specific
    applicability. Berry and Kamsties (2000, "The Dangerous 'All'") is
    the canonical source for treating universal quantifiers as creating
    distributive-vs-collective interpretation problems and verification
    cost.

# ====================================================================
# ACTOR AMBIGUITY placeholders
# ====================================================================
"<TBD_ROLE>":
  triggers:
    - {word: user,     source: empirical}
    - {word: admin,    source: empirical}
    - {word: person,   source: empirical}
    - {word: someone,  source: empirical}
    # --- v1.1 literature additions ---
    - {word: they,     source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: it,       source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: this,     source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: them,     source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: anyone,   source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified additions ---
    - {word: "guest user",     source: literature, source_citation: AmbiTRUS, evidence: PRIMARY}
    - {word: "verified user",  source: literature, source_citation: AmbiTRUS, evidence: PRIMARY}
    # --- v1.2: human-action verbs that imply human actor responsibility ---
    - {word: determine,        source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: ignore,           source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: consider,         source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: analyse,          source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: analyze,          source: literature, source_citation: BB2010, evidence: PRIMARY}
  rationale: >
    Generic actor references and anaphoric pronouns that mask specific
    role identity. Berrocal and Barrantes (2010) identify human-action
    verbs as anthropomorphizing the system: when these appear, the
    responsible human actor must be specified.

"<TBD_PERMISSION_LEVEL>":
  triggers:
    - {word: admin,         source: empirical}
    - {word: administrator, source: empirical}
    - {word: manager,       source: empirical}
    - {word: supervisor,    source: empirical}
    - {word: authorized,    source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: privileged,    source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
  rationale: >
    Role mentions that imply but do not specify permission levels.

# ====================================================================
# ACCEPTANCE AMBIGUITY placeholders
# ====================================================================
"<TBD_ACCEPTANCE_CRITERIA>":
  triggers:
    - {word: better,     source: empirical}
    - {word: improved,   source: empirical}
    - {word: good,       source: empirical}
    - {word: successful, source: empirical}
    - {word: working,    source: empirical}
    - {word: correct,    source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: valid,      source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified additions ---
    - {word: clearly,    source: literature, source_citation: KIY2007, evidence: PRIMARY}
    - {word: similar,    source: literature, source_citation: KIY2007, evidence: PRIMARY}
    - {word: complicated, source: literature, source_citation: ICARD2023, evidence: PRIMARY}
    - {word: complex,    source: literature, source_citation: ICARD2023, evidence: PRIMARY}
    - {word: likely,     source: literature, source_citation: ICARD2023, evidence: PRIMARY}
    - {word: enough,     source: literature, source_citation: ICARD2023, evidence: PRIMARY}
    - {word: carefully,  source: literature, source_citation: SD2018, evidence: PRIMARY}
  rationale: >
    Vague success descriptors and combinatorial-vagueness markers that
    lack testable acceptance conditions. Icard et al. (2023, VAGO)
    empirically validate "complicated", "complex", "likely", and
    "enough" as combinatorial-vagueness markers. Saint-Dizier (2018,
    LELIE) flags "carefully" as an incompatible adverb.

"<TBD_MEASURABLE_OUTCOME>":
  triggers:
    - {word: ensure,    source: empirical}
    - {word: improve,   source: empirical}
    - {word: enhance,   source: empirical}
    - {word: optimize,  source: empirical}
    - {word: increase,  source: empirical}
    - {word: reduce,    source: empirical}
    - {word: provide,   source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: deliver,   source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified addition from Carlson and Laplante 2014 weak-phrases list ---
    - {word: "provide for", source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
  rationale: >
    Outcome verbs that imply measurement but provide no metric.

# ====================================================================
# DEPENDENCY AMBIGUITY placeholders
# ====================================================================
"<TBD_DEPENDENCY>":
  triggers:
    - {word: via,           source: empirical}
    - {word: through,       source: empirical}
    - {word: using,         source: empirical}
    - {word: with,          source: empirical}
    - {word: integrated,    source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    - {word: connected,     source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified additions: completeness gap markers ---
    - {word: tbd,           source: literature, source_citation: CL2014, evidence: DERIVED, note: "appears in CL2014 Fig. 4 p. 80 as a SATC completeness metric, used here as lexical trigger"}
    - {word: tba,           source: literature, source_citation: CL2014, evidence: DERIVED, note: "appears in CL2014 Fig. 4 p. 80 as a SATC completeness metric, used here as lexical trigger"}
  rationale: >
    Connector words that hint at unspecified upstream dependencies, plus
    explicit gap markers (TBD/TBA) that appear in the NASA SATC quality
    model.

"<TBD_PRECONDITION>":
  triggers:
    - {word: when,    source: empirical}
    - {word: if,      source: empirical}
    - {word: before,  source: empirical}
    - {word: after,   source: empirical}
    - {word: upon,    source: empirical}
    - {word: once,    source: literature, source_citation: "EARS_Mavin_2009", evidence: PRIMARY}
    - {word: while,   source: literature, source_citation: "EARS_Mavin_2009", evidence: PRIMARY}
    # --- v1.2 verified additions: non-deterministic temporal adverbs ---
    - {word: continually,  source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: periodically, source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: regularly,    source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: later,        source: literature, source_citation: BB2010, evidence: PRIMARY}
  rationale: >
    Conditional and temporal markers that hint at unspecified preconditions.
    Berrocal and Barrantes (2010) identify "continually", "periodically",
    "regularly", and "later" as non-deterministic adverbs that fail to
    define discrete temporal bounds or event triggers.

# ====================================================================
# PRIORITY AMBIGUITY placeholders
# ====================================================================
"<TBD_PRIORITY_LEVEL>":
  triggers:
    - {word: important,    source: empirical}
    - {word: critical,     source: empirical}
    - {word: urgent,       source: empirical}
    - {word: priority,     source: empirical}
    - {word: high,         source: empirical}
    - {word: low,          source: empirical}
    - {word: essential,    source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: "nice-to-have", source: literature, source_citation: AmbiTRUS, evidence: DERIVED}
    # --- v1.2 verified additions: NASA ARM options/modal verbs (Carlson and Laplante 2014, Sec. 3.3.4, p. 83) ---
    - {word: can,         source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: may,         source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: optionally,  source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    # --- v1.2 verified additions: NASA ARM weak imperatives (Table 3, p. 82) ---
    - {word: should,      source: literature, source_citation: CL2014, evidence: PRIMARY, note: "Rosenberg 1999 explicitly recommends 'should' not be used in requirements"}
    - {word: "are to",    source: literature, source_citation: CL2014, evidence: PRIMARY}
    - {word: could,       source: literature, source_citation: B2022, evidence: DERIVED}
    - {word: "if practical", source: literature, source_citation: B2022, evidence: DERIVED, verification: "primary source TBD; not in CL2014 reproduction"}
    - {word: "if required",  source: literature, source_citation: B2022, evidence: DERIVED, verification: "primary source TBD; not in CL2014 reproduction"}
  rationale: >
    Priority descriptors and optionality markers without concrete
    classification levels. Carlson and Laplante (2014, Sec. 3.3.4, p. 83)
    reproduce the NASA ARM options list: "can", "may", "optionally" are
    primary triggers because they "loosen the specification by allowing
    the developer latitude in implementing a requirement." Bajceta et al.
    (2022) empirically validate these on industrial data.

"<TBD_URGENCY>":
  triggers:
    - {word: soon,         source: empirical}
    - {word: immediately,  source: empirical}
    - {word: asap,         source: empirical}
    - {word: possible,     source: empirical}
    - {word: quickly,      source: empirical}
    # --- v1.1 literature additions ---
    - {word: eventually,   source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: timely,       source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    # --- v1.2 verified addition: Saint-Dizier 2018 incompatible adverb ---
    - {word: quickly,      source: literature, source_citation: SD2018, evidence: PRIMARY, note: "also empirically observed in Cornelius; SD2018 confirms academic grounding"}
  rationale: >
    Temporal urgency markers without concrete deadlines. "Timely" is from
    the verified NASA ARM weak-phrases list (Carlson and Laplante 2014).
    "Quickly" has dual attestation (Cornelius empirical + Saint-Dizier
    2018 as incompatible adverb).

