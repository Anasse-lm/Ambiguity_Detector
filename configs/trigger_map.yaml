# trigger_map.yaml — v1.2
#
# Maps token patterns to placeholder preferences for the IG-to-placeholder
# bridge. When the Integrated Gradients module identifies a token as
# influential for an ambiguity prediction, the bridge consults this map
# to determine which placeholder(s) are most relevant.
#
# ============================================================================
# DERIVATION (v1.2: expanded with verified-primary-citation triggers)
# ============================================================================
# Triggers now come from THREE SOURCES, marked explicitly per trigger:
#
#   source: empirical
#     Triggers observed at the ambiguity-marking position in the 519-story
#     stratified sample from the Cornelius_2025 dataset.
#
#   source: literature
#     Triggers added based on documented patterns in RE literature, with
#     specific citation in the source_citation field.
#
# Plus an evidence field for literature-attested triggers:
#   evidence: PRIMARY
#     The source explicitly lists the word in a named word list, table, or
#     pattern catalogue.
#   evidence: DERIVED
#     The source uses the word in analysis or example text but does not
#     include it in a formal trigger list.
#
# Marking the source of each trigger makes the audit trail explicit: an
# examiner can distinguish triggers that were data-observed from triggers
# that were literature-attested, and can further distinguish PRIMARY from
# DERIVED evidence levels among the literature-attested ones.
#
# The source field does NOT affect the bridge's matching logic. It is
# purely a documentation field for traceability.
#
# ============================================================================
# CITATION KEY (full bibliographic info in placeholders.yaml preamble)
# ============================================================================
#   CL2014    = Carlson, N. and Laplante, P. (2014). The NASA automated
#               requirements measurement tool: a reconstruction.
#               Innov. Syst. Softw. Eng. 10(2), 77-91.
#   B2022     = Bajceta, A. et al. (2022). Using NLP Tools to Detect
#               Ambiguities in System Requirements. NLP4RE 2022 @ REFSQ.
#   BK2000    = Berry, D. M. and Kamsties, E. (2000). The Dangerous "All"
#               in Specifications. IWSSD.
#   BB2010    = Berrocal Rojas, A. and Barrantes Sliesarieva, E. G. (2010).
#               NAACL HLT Workshop.
#   AP2022    = Amna, A. R. and Poels, G. (2022). Ambiguity in user stories:
#               A systematic literature review. Info. Softw. Tech. 145.
#   AmbiTRUS  = AmbiTRUS framework (Amna and Poels, 2022/2025).
#   WANG2013  = Wang et al. (2013). NLDB, LNCS 7934. [verification recommended]
#   ICARD2023 = Icard et al. (2023). VAGO Neural System.
#               arXiv:2309.06132 [verification recommended]
#   SD2018    = Saint-Dizier (2018). LELIE/TextCoop. Data Knowl. Eng.
#               [verification recommended]
#   KIY2007   = Kiyavitskaya et al. (2007). QuARS QM. Requirements Engineering
#               [verification recommended]
#   MASS2014  = Massey et al. (2014). RE Conference, HIPAA study.

version: "1.2"

# ====================================================================
# SEMANTIC AMBIGUITY placeholders
# ====================================================================
"<TBD_ACTION_SPECIFICATION>":
  triggers:
    # --- v1.0/v1.1 empirical triggers (Cornelius) ---
    - {word: process,     source: empirical}
    - {word: manage,      source: empirical}
    - {word: handle,      source: empirical}
    - {word: access,      source: empirical}
    - {word: update,      source: empirical}
    - {word: perform,     source: empirical}
    - {word: execute,     source: empirical}
    # --- v1.1 literature additions ---
    - {word: document,    source: literature, source_citation: terminological_ambiguity_2018, evidence: DERIVED}
    - {word: service,     source: literature, source_citation: terminological_ambiguity_2018, evidence: DERIVED}
    - {word: transaction, source: literature, source_citation: AP2022, evidence: DERIVED}
    # --- v1.2 verified additions ---
    - {word: monitor,     source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: support,     source: literature, source_citation: BB2010, evidence: PRIMARY}
    - {word: check,       source: literature, source_citation: BB2010, evidence: PRIMARY}
  rationale: >
    Generic action verbs and overloaded domain terms that mask which
    specific operation is intended. Berrocal and Barrantes (2010, NAACL
    HLT) classify "process", "monitor", "support", and "check" as general
    verbs that fail to identify the specific software action required.

"<TBD_METRIC>":
  triggers:
    - {word: fast,         source: empirical}
    - {word: quick,        source: empirical}
    - {word: quickly,      source: empirical}
    - {word: slow,         source: empirical}
    - {word: efficient,    source: empirical}
    - {word: efficiently,  source: empirical}
    - {word: rapid,        source: empirical}
    - {word: responsive,   source: empirical}
    - {word: timely,       source: empirical}
    # --- v1.1 literature additions ---
    - {word: high,         source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: maximum,      source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: minimum,      source: literature, source_citation: AP2022, evidence: DERIVED}
  rationale: >
    Qualitative speed/performance descriptors and unquantified magnitude
    modifiers that lack measurable thresholds. "Timely" appears verbatim
    in the NASA ARM weak-phrases list (Carlson and Laplante 2014, Sec.
    3.3.5, p. 83).

"<TBD_QUALIFIER>":
  triggers:
    - {word: appropriate,    source: empirical}
    - {word: appropriately,  source: empirical}
    - {word: comprehensive,  source: empirical}
    - {word: detailed,       source: empirical}
    - {word: robust,         source: empirical}
    - {word: effective,      source: empirical}
    # --- v1.1 literature additions ---
    - {word: proper,         source: literature, source_citation: AP2022, evidence: PRIMARY}
    - {word: reasonable,     source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: acceptable,     source: literature, source_citation: AP2022, evidence: DERIVED}
    # --- v1.2 verified ARM additions (Carlson and Laplante 2014, Sec. 3.3.5, p. 83) ---
    - {word: adequate,       source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: sufficient,     source: literature, source_citation: AP2022, evidence: DERIVED}
    - {word: "as appropriate", source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "be able to",   source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "be capable of", source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "capability of", source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "as required",  source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: normal,         source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "provide for",  source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
    - {word: "easy to",      source: literature, source_citation: CL2014, evidence: PRIMARY, corroborator: B2022}
  rationale: >
    Undefined qualitative descriptors that resist measurement. The
    NASA ARM weak-phrases list (Carlson and Laplante 2014, Sec. 3.3.5,
    p. 83) is the primary source for these triggers, empirically
    validated by Bajceta et al. (2022, NLP4RE @ REFSQ) on 180 industrial
    requirements with recall 0.85 to 0.98.

